name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyinstaller pymupdf selenium==4.27.1 webdriver-manager PyQt5==5.15.11

      - name: Build with PyInstaller
        run: |
          cd app_jpg
          pyinstaller --clean spec.spec

      - name: Copy PyQt5 platforms plugin
        run: |
          $p = python -c "import PyQt5,os; print(os.path.dirname(PyQt5.__file__))"
          Copy-Item -Recurse "$p\Qt\plugins\platforms" -Destination "app_jpg\dist\体检报告上传\"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 体检报告上传-Windows
          path: app_jpg/dist/
